services:
  workout:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workout
    restart: unless-stopped
    ports:
      - "8060:8060"
    environment:
      WORKOUT_PASSWORD_HASH: ${WORKOUT_PASSWORD_HASH:-}
      WORKOUT_AUTH_SECRET: ${WORKOUT_AUTH_SECRET:-}
    volumes:
      - /srv/webdata/workout:/data
